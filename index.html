<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção - ONG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🐾 Proposta de Adoção</h1>
        <p>Preencha os dados abaixo com sinceridade. Sua resposta passará por análise.</p>
        
        <form id="adoptionForm">
            <div class="section">
                <h3>Dados Pessoais</h3>
                <input type="text" id="nome" placeholder="Nome Completo" required>
                <input type="email" id="email" placeholder="E-mail" required>
                <input type="text" id="telefone" placeholder="Telefone (mín. 8 dígitos)" required>
                <input type="text" id="cpf" placeholder="CPF (Apenas números)" required>
                <input type="number" id="idade" placeholder="Sua Idade" required>
                <input type="text" id="cidade" placeholder="Cidade" required>
            </div>

            <div class="section">
                <h3>Sobre sua Moradia</h3>
                <select id="tipoMoradia" required>
                    <option value="">Tipo de Moradia</option>
                    <option value="casa">Casa</option>
                    <option value="apartamento">Apartamento</option>
                </select>

                <div id="campoQuintal" class="hidden">
                    <label>Possui quintal?</label>
                    <select id="possuiQuintal">
                        <option value="nao">Não</option>
                        <option value="sim">Sim</option>
                    </select>
                </div>

                <div id="campoExtraMoradia" class="hidden">
                    <label id="labelExtraMoradia"></label>
                    <select id="extraMoradia">
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="section">
                <h3>Rotina e Histórico</h3>
                <select id="tevePet" required>
                    <option value="">Já teve pet antes?</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
                
                <label>Horas que o pet ficará sozinho:</label>
                <input type="number" id="horasSozinho" min="0" max="24" required>
                
                <textarea id="motivo" placeholder="Motivo da adoção (Mínimo 10 caracteres)" minlength="10" required></textarea>
            </div>

            <div class="section">
                <label class="checkbox-container">
                    <input type="checkbox" id="termo"> Aceito os termos de responsabilidade e cuidados com o animal.
                </label>
            </div>

            <button type="submit">Enviar Proposta</button>
        </form>

        <div id="resultado" class="hidden">
            <h2>Resumo da Inscrição</h2>
            <div id="dadosEnviados"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
