<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário De Adoção</title>
</head>

<body>

    <div class="container">
        <h2>Formulário de Adoção</h2>

        <div class="foto-pet">
            <img src="scripts/Golden.png.png" alt="Filhote de Golden Retriever" id="golden-img">
            <p><strong>Candidato:</strong>Filhote de Golden Retriever</p>
        </div>

        <form id="formAdocao">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Digite seu email" required>
            <br><br>

            <label for="tel">Telefone:</label>
            <input type="tel" id="tel" placeholder="Digite seu telefone">
            <br><br>

            <label for="age">Idade</label>
            <input type="number" id="age" placeholder="Digite sua idade">
            <br><br>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" placeholder="000.000.000-00">
            <br><br>

            <label for="moradia">Moradia:</label>
            <select name="moradia" id="moradia">
                <option value="">Selecione</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
            </select>
            <br><br>

            <label>Possui Quintal?</label>
            <input type="radio" name="quintal" value="sim">Sim
            <input type="radio" name="quintal" value="nao">Não
            <br><br>

            <label for="tevePet">Já teve um pet?:</label>
            <select name="pet" id="tevePet">
                <option value="">selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
            <br><br>

            <label for="horasSo">Quantas horas o animal fica sozinho por dia?</label>
            <input type="number" id="horasSo" required>
            <br><br>

            <label for="motivo">Motivo da adoção:</label>
            <textarea id="motivo" placeholder="Porque da adoção" required></textarea>
            <br><br>

            <div style="margin-top: 15px;">
                <input type="checkbox" id="termo" style="width: auto;" required> 
                <label style="display: inline;" for="termo">Aceito o termo de responsabilidade</label>
            </div>
            <br><br>

            <button type="submit">Enviar</button>
        </form>

        <div id="resultado"></div>
    </div>

    <script src="scripts/ad.js"></script>

</body>

</html>
