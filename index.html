<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção - ONG</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <h2>Formulário de Interesse em Adoção</h2>

    <form id="formAdocao">
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" placeholder="Digite seu nome" required>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite seu email" required>
        <br><br>

        <label for="tel">Telefone:</label>
        <input type="text" id="tel" placeholder="Mínimo 8 dígitos" required>
        <br><br>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" required>
        <br><br>

        <label for="idade">Idade:</label>
        <input type="number" id="idade" placeholder="Apenas maiores de 18" required>
        <br><br>

        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Sua cidade" required>
        <br><br>

        <label for="moradia">Tipo de Moradia:</label>
        <select name="moradia" id="moradia" required>
            <option value="">Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>
        <br><br>

        <label>Possui Quintal?</label>
        <input type="radio" name="quintal" value="sim"> Sim
        <input type="radio" name="quintal" value="nao"> Não
        <br><br>

        <label for="pet">Já teve um pet antes?</label>
        <select id="petAnterior" required>
            <option value="">Selecione</option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>
        <br><br>

        <label>Quantas horas o animal ficará sozinho por dia?</label>
        <input type="number" id="horasSo" required min="0" max="24">
        <br><br>

        <label>Motivo da adoção:</label><br>
        <textarea id="motivo" placeholder="Conte-nos o motivo (mínimo 10 caracteres)" required style="width: 300px; height: 80px;"></textarea>
        <br><br>

        <div style="margin-top: 15px;">
            <input type="checkbox" id="termo" required> 
            <label for="termo">Aceito o termo de responsabilidade</label>
        </div>
        <br>

        <button type="submit" id="btnEnviar">Enviar Formulário</button>
    </form>

    <div id="resultado" style="margin-top: 30px;"></div>

    <script src="scripts/script.js"></script>
</body>
</html>
