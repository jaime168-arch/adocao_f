<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário De Adoção</title>
</head>

<body>

    <h2>Formulário de Adoção</h2>

    <form id="formAdocao">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Digite seu nome">
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite seu email">
        <br>
        <label for="moradia">Moradia:</label>
        <select name="moradia" id="moradia">
            <option value="">Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>
        <br>
        <label for="quintal">Possui Quintal?</label>
        <input type="radio" name="quintal" value="sim">Sim
        <input type="radio" name="quintal" value="nao">Não
        <br>
        <label for="pet">Já teve um pet?:</label>
        <select name="pet" id="Já teve um pet">
            <option value="">selecione</option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>
        <br>
        <label>Quantas horas o animal fica sozinho por dia?</label>
        <input type="numero" id="horasSo" required>
        <br>
        <label>Motivo da adoção:</label>
        <textarea id="motivo" placeholder="Porque da adoção"required></textarea>
        <br>
        <button type="submit">Enviar</button>
    </form>

    <div id="resultado"></div>

    <script src="scripts/script.js"></script>

</body>

</html>
