<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção - ONG</title>
    <style>
        .hidden { display: none; }
        .error { color: red; font-size: 0.8em; }
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; }
        .radio-group { display: flex; gap: 10px; align-items: center; }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; }
    </style>
</head>
<body>

    <h2>🐾 Formulário de Interesse em Adoção</h2>

    <form id="formAdocao">
        <label>Nome Completo:</label>
        <input type="text" id="nome" required>

        <label>Email:</label>
        <input type="email" id="email" required>

        <label>Telefone:</label>
        <input type="text" id="telefone" placeholder="(00) 00000-0000" required>

        <label>CPF:</label>
        <input type="text" id="cpf" required>

        <label>Idade:</label>
        <input type="number" id="idade" required>

        <label>Cidade:</label>
        <input type="text" id="cidade" required>

        <label>Tipo de Moradia:</label>
        <select id="moradia" required>
            <option value="">Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>

        <div id="secaoQuintal" class="hidden">
            <label>Possui quintal?</label>
            <div class="radio-group">
                <input type="radio" name="quintal" value="sim"> Sim
                <input type="radio" name="quintal" value="nao"> Não
            </div>
            <label>O quintal é totalmente seguro (muros/grades)?</label>
            <select id="quintalSeguro">
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
        </div>

        <div id="secaoApto" class="hidden">
            <label>O condomínio permite animais?</label>
            <select id="permiteAnimaisApto">
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
        </div>

        <label>Já teve pet antes?</label>
        <select id="tevePet" required>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>

        <label>Quantas horas o animal ficará sozinho por dia?</label>
        <input type="number" id="horasSozinho" required>

        <label>Motivo da adoção:</label>
        <textarea id="motivo" placeholder="Conte-nos por que deseja adotar..." required></textarea>

        <div style="margin-top: 15px;">
            <input type="checkbox" id="termo" style="width: auto;"> 
            <label style="display: inline;" for="termo">Aceito o termo de responsabilidade</label>
        </div>

        <button type="submit">Enviar Proposta de Adoção</button>
    </form>

    <div id="resultado" style="margin-top: 20px; padding: 15px; border: 1px solid #ccc; display: none;"></div>

    <script src="scripts/script.js"></script>
</body>
</html>
