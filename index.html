<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário De Adoção</title>
</head>

<body>

    <h2>Formulário de Adoção</h2>

    <form id="formAdocao">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Digite seu nome" required>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite seu email" required>
        <br><br>

        <label for="numero">Telefone:</label>
        <input type="numero" id="tel" placeholder="Digite seu telefone">
        <br><br>

         <label for="idade">Idade</label>
        <input type="numero" id="age" placeholder="Digite sua idade">
        <br><br>

        <label for="cpf">CPF:</label>
        <input type="numero" id="cpf" placeholder="000.000.000-00">
        <br><br>

        <label for="moradia">Moradia:</label>
        <select name="moradia" id="moradia">
            <option value="">Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>
        <br><br>

        <label for="quintal">Possui Quintal?</label>
        <input type="radio" name="quintal" value="sim">Sim
        <input type="radio" name="quintal" value="nao">Não
        <br><br>

        <label for="pet">Já teve um pet?:</label>
        <select name="pet" id="Já teve um pet">
            <option value="">selecione</option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>
        <br><br>

        <label>Quantas horas o animal fica sozinho por dia?</label>
        <input type="numero" id="horasSo" required>
        <br><br>

        <label>Motivo da adoção:</label>
        <textarea id="motivo" placeholder="Porque da adoção"required></textarea>
        <br><br>

        <div style="margin-top: 15px;">
            <input type="checkbox" id="termo" style="width: auto;"> 
            <label style="display: inline;" for="termo">Aceito o termo de responsabilidade</label>
        </div>
        <br><br>

        <button type="submit">Enviar</button>
    </form>

    <div id="resultado"></div>

    <script src="scripts/ad.js"></script>

</body>

</html>
